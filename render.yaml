services:
  - type: web
    name: ai-receptionist-backend
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: GOOGLE_CREDENTIALS_BASE64
        sync: false
      - key: GOOGLE_CALENDAR_ID
        sync: false
      - key: GOOGLE_SPREADSHEET_ID
        sync: false
      - key: BUSINESS_NAME
        value: Amityville Acupuncture
      - key: BUSINESS_PHONE
        sync: false
      - key: BUSINESS_ADDRESS
        sync: false
      - key: BUSINESS_WEBSITE
        sync: false
      - key: TIMEZONE
        value: America/New_York
      - key: DEFAULT_APPOINTMENT_DURATION
        value: "60"
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_REPLY_TO
        sync: false
